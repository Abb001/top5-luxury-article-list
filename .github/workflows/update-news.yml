name: Update luxury news

on:
  # GitHub Actions cron uses UTC. These times equal 08:00, 11:00, 14:00, 17:00, 20:00, 23:00 in Taiwan time (UTC+8).
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: luxury-news-update
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch today's news and required history
        run: npm run fetch:backfill
        env:
          TZ: Asia/Taipei

      - name: Commit changed data only
        id: commit_data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes. Skipping commit."
          else
            git commit -m "Update luxury news data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site artifact
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
