name: Top 5 Luxury Plain Article List Monitor

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-top5-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Top 5 luxury plain article list monitor
        run: python top5_luxury_plain_list_agent.py --json
      - name: Check archive links
        run: |
          if grep -R "archive/archive" docs; then
            echo "Found broken archive/archive links"
            exit 1
          fi
          echo "Archive links OK"
      - name: Check report date filter
        run: |
          TODAY=$(TZ=Asia/Taipei date +%F)
          python - <<'PY'
          import json, os
          from pathlib import Path
          today=os.popen('TZ=Asia/Taipei date +%F').read().strip()
          p=Path('latest_top5_luxury_articles.json')
          if p.exists():
              data=json.loads(p.read_text(encoding='utf-8'))
              bad=[x for x in data if x.get('published_local_date') != today]
              if bad:
                  print('Found articles outside report date:', bad[:3])
                  raise SystemExit(1)
          print('Report date filter OK')
          PY
      - name: Commit generated website
        run: |
          git config user.name "top5-luxury-plain-agent"
          git config user.email "top5-luxury-plain-agent@example.com"
          git add data reports docs latest_top5_luxury_articles.json || true
          git commit -m "Update top 5 luxury plain article list monitor" || echo "No changes to commit"
          git push
