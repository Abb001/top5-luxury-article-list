<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5 Luxury News</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <p class="eyebrow">Luxury News Tracker</p>
    <h1>5 Luxury News</h1>
    <p class="subtitle">Daily curated luxury, fashion, and market news.</p>
    <p id="todayLabel" class="date"></p>
  </header>

  <main>
    <section class="card">
      <div class="section-head">
        <h2 id="title">Loading...</h2>
        <button id="backBtn" class="back hidden" type="button">← Back to Today</button>
      </div>
      <div id="empty" class="empty hidden"></div>
      <ol id="list" class="article-list"></ol>
    </section>

    <section class="card">
      <h2>History</h2>
      <p class="muted">Select a date to view previous search results.</p>
      <div id="history" class="history"></div>
    </section>
  </main>

  <footer>
    <p>Source: public RSS search results. Dates are interpreted using Asia/Taipei time.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
